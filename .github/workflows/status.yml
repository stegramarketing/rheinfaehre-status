name: Fähren-Status schreiben
on:
  repository_dispatch:
    types: [set-status]
permissions:
  contents: write
jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: status.json schreiben
        env:
          STATUS: ${{ github.event.client_payload.status }}
        run: |
          if [ "$STATUS" != "an" ] && [ "$STATUS" != "aus" ]; then
            echo "Ungueltiger Status: $STATUS"; exit 1
          fi
          printf '{"status":"%s"}\n' "$STATUS" > status.json
          git config user.name "ferry-bot"
          git config user.email "ferry-bot@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "Status: $STATUS"
          git push
